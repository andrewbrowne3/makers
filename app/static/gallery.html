<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>MakersGarments — Gallery</title>
<style>
  :root { color-scheme: light dark; font-family: system-ui, sans-serif; }
  body { max-width: 1400px; margin: 2rem auto; padding: 0 1rem; }
  h1 { margin-bottom: .25rem; }
  .sub { color: #888; font-size: .9rem; margin-bottom: 1.25rem; }
  nav { display: flex; flex-wrap: wrap; gap: .5rem; margin-bottom: 1.5rem; padding: 1rem; background: #8881; border-radius: 8px; }
  nav a { padding: .35rem .75rem; border-radius: 999px; background: #fff1; text-decoration: none; color: inherit; font-size: .9rem; border: 1px solid #6663; cursor: pointer; }
  nav a.active, nav a:hover { background: #0a84ff; color: #fff; border-color: #0a84ff; }
  .section { margin-top: 2rem; }
  .section h2 { border-bottom: 1px solid #6663; padding-bottom: .5rem; margin-bottom: 1rem; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1rem; }
  .card { border: 1px solid #6663; border-radius: 8px; padding: .5rem; }
  .card img { width: 100%; aspect-ratio: 1; object-fit: contain; border-radius: 4px; background: #eee3; cursor: zoom-in; }
  .meta { font-size: .82rem; color: #888; display: flex; justify-content: space-between; margin-top: .4rem; align-items: center; }
  .badge { padding: 2px 8px; border-radius: 999px; font-weight: 600; font-size: .78rem; }
  .good { background: #28a74522; color: #28a745; } .meh { background: #ff950022; color: #ff9500; } .bad { background: #dc354522; color: #dc3545; } .muted { background: #8884; color: #666; }
  .kind-ui         { background: #28a74522; color: #28a745; }
  .kind-adhoc      { background: #0a84ff22; color: #0a84ff; }
  .kind-batch      { background: #a855f722; color: #a855f7; }
  .kind-regression { background: #f9731622; color: #f97316; }
  .kind-legacy     { background: #8884;     color: #666;    }
  .run-pill { display: inline-block; padding: 1px 7px; border-radius: 999px; font-size: .72rem; font-weight: 600; margin-left: .3rem; cursor: pointer; }
  .retry-icon { margin-left: .25rem; }
  .hero-icon { margin-left: .25rem; }
  .direction-pill { display: inline-block; padding: 1px 7px; border-radius: 999px; font-size: .72rem; background: #8882; color: #888; margin-right: .3rem; }
  .card.hero { outline: 2px solid #28a745; outline-offset: 2px; }
  .filters { display: flex; gap: .4rem; flex-wrap: wrap; margin: .5rem 0 1rem; }
  .filters label { font-weight: 400; font-size: .8rem; cursor: pointer; padding: .2rem .5rem; border: 1px solid #6663; border-radius: 999px; display: flex; align-items: center; gap: .3rem; }
  .filters input { margin: 0; }
  .note { font-size: .78rem; color: #aaa; margin-top: .35rem; line-height: 1.35; max-height: 3.4em; overflow: hidden; }
  .empty { color: #888; font-style: italic; padding: .5rem 0; }
  .logo-row { display: flex; gap: .5rem; flex-wrap: wrap; margin-bottom: 1rem; }
  .logo-row .card { width: 140px; }
  .status { color: #888; font-size: .85rem; }
  .modal { position: fixed; inset: 0; background: #000c; display: none; align-items: center; justify-content: center; padding: 2rem; z-index: 100; }
  .modal.open { display: flex; }
  .modal img { max-width: 100%; max-height: 100%; border-radius: 8px; }
  .modal .close { position: absolute; top: 1rem; right: 1rem; color: #fff; font-size: 2rem; cursor: pointer; background: none; border: 0; }
  .tab { padding: .5rem 1rem; border: 1px solid #6663; border-radius: 6px; background: transparent; color: inherit; font-weight: 600; cursor: pointer; }
  .tab.active { background: #0a84ff; color: #fff; border-color: #0a84ff; }
  .run-row { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 1fr 1fr; gap: .75rem; padding: .6rem .75rem; border-bottom: 1px solid #8883; align-items: center; }
  .run-row.header { font-weight: 700; background: #8881; border-radius: 6px 6px 0 0; }
  .run-row:hover:not(.header) { background: #0a84ff11; cursor: pointer; }
  .run-row .label { font-weight: 600; }
</style>
</head>
<body>

<h1>Gallery</h1>
<p class="sub">All stored designs, logos, and baselines. Zero generation cost — just browsing. <a href="/">← back to generator</a></p>

<div style="display:flex;gap:1rem;margin-bottom:1rem;">
  <button id="view-clients" class="tab active">By client</button>
  <button id="view-runs"    class="tab">By run</button>
</div>

<nav id="clients"></nav>
<div id="body"><p class="status">loading…</p></div>

<div class="modal" id="modal"><button class="close" onclick="closeModal()">×</button><img id="modalImg" alt=""></div>

<script>
function scoreClass(s) {
  if (s == null) return 'muted';
  if (s >= 0.7) return 'good';
  if (s >= 0.4) return 'meh';
  return 'bad';
}

function runKindFor(d) {
  return d.run_kind || (d.run_id ? 'adhoc' : 'legacy');
}

function runPillHTML(d) {
  const kind = runKindFor(d);
  if (d.run_id) {
    return `<span class="run-pill kind-${kind}" onclick="event.stopPropagation();showRun(${d.run_id});document.getElementById('view-runs').classList.add('active');document.getElementById('view-clients').classList.remove('active');">${kind} · run#${d.run_id}</span>`;
  }
  return `<span class="run-pill kind-legacy">legacy</span>`;
}

const KINDS = ['ui', 'adhoc', 'batch', 'regression', 'legacy'];
let activeFilters = new Set(KINDS);

function filtersHTML() {
  return `<div class="filters">
    <span style="color:#888;font-size:.8rem;">Show:</span>
    ${KINDS.map(k => `<label class="kind-${k}">
      <input type="checkbox" data-kind="${k}" ${activeFilters.has(k) ? 'checked' : ''}> ${k}
    </label>`).join('')}
  </div>`;
}

function attachFilterListeners(onChange) {
  document.querySelectorAll('.filters input').forEach(cb => {
    cb.onchange = () => {
      const k = cb.dataset.kind;
      if (cb.checked) activeFilters.add(k); else activeFilters.delete(k);
      onChange();
    };
  });
}

function openModal(src) {
  document.getElementById('modalImg').src = src;
  document.getElementById('modal').classList.add('open');
}
function closeModal() {
  document.getElementById('modal').classList.remove('open');
}

async function loadClients() {
  const r = await fetch('/clients');
  const j = await r.json();
  const nav = document.getElementById('clients');
  if (!j.clients.length) {
    document.getElementById('body').innerHTML = '<p class="empty">No clients in the DB yet. Run <code>python -m scripts.ingest_training_data</code> then generate something from <a href="/">the main page</a>.</p>';
    return;
  }
  j.clients.forEach(c => {
    const a = document.createElement('a');
    a.textContent = c.name;
    a.onclick = (e) => { e.preventDefault(); showClient(c.name, a); };
    nav.appendChild(a);
  });
  // auto-load the first client that has AI designs
  showClient(j.clients[0].name, nav.firstChild);
}

async function showClient(name, linkEl) {
  document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
  if (linkEl) linkEl.classList.add('active');
  const body = document.getElementById('body');
  body.innerHTML = '<p class="status">loading ' + name + '…</p>';

  const [logos, designs, baselines, templates] = await Promise.all([
    fetch(`/clients/${encodeURIComponent(name)}/logos`).then(r => r.json()),
    fetch(`/clients/${encodeURIComponent(name)}/designs`).then(r => r.json()),
    fetch(`/clients/${encodeURIComponent(name)}/baselines`).then(r => r.json()),
    fetch(`/clients/${encodeURIComponent(name)}/templates`).then(r => r.json()),
  ]);

  let html = `<div class="section"><h2>${name}</h2></div>`;

  // Logos
  html += `<div class="section"><h2>Logos (${logos.logos.length})</h2>`;
  if (!logos.logos.length) {
    html += `<p class="empty">No logos tracked.</p>`;
  } else {
    html += `<div class="logo-row">`;
    logos.logos.forEach(l => {
      html += `<div class="card"><img src="${l.url}" onclick="openModal('${l.url}')" alt="${l.filename}"><div class="meta"><span>${l.filename}</span></div></div>`;
    });
    html += `</div>`;
  }
  html += `</div>`;

  // AI-generated designs
  const ai = designs.designs.filter(d => d.source === 'ai_generated');
  const visible = ai.filter(d => activeFilters.has(runKindFor(d)));
  html += `<div class="section"><h2>AI renders (${visible.length}/${ai.length})</h2>`;
  html += filtersHTML();
  if (!visible.length) {
    html += `<p class="empty">${ai.length ? 'All renders hidden by filter.' : 'No AI renders yet for this client.'}</p>`;
  } else {
    html += `<div class="grid" id="ai-grid">`;
    visible.forEach(d => {
      const cls = scoreClass(d.evaluator_score);
      const score = d.evaluator_score != null ? d.evaluator_score.toFixed(2) : '—';
      const src = d.image_url || '';
      const retryIcon = d.attempts > 1 ? ' <span class="retry-icon" title="retried">🔁</span>' : '';
      const heroIcon = d.is_hero ? ' <span class="hero-icon" title="hero variant">🏆</span>' : '';
      const dirPill = d.direction_label ? `<span class="direction-pill">${d.direction_label}</span>` : '';
      html += `<div class="card${d.is_hero ? ' hero' : ''}">
        ${src ? `<img src="${src}" onclick="openModal('${src}')" alt="mockup">` : '<div style="aspect-ratio:1;background:#dc354522;color:#dc3545;display:flex;align-items:center;justify-content:center;border-radius:4px;">no image</div>'}
        <div class="meta">
          <span>${dirPill}mock#${d.mockup_index ?? '?'} v${d.version}${retryIcon}${heroIcon}</span>
          <span class="badge ${cls}">${score}</span>
        </div>
        <div style="margin-top:.3rem;">${runPillHTML(d)}</div>
        ${d.evaluator_notes ? `<div class="note">${d.evaluator_notes}</div>` : ''}
      </div>`;
    });
    html += `</div>`;
  }
  html += `</div>`;

  // Templates used (source mockups that were fed into NB Pro for this client)
  html += `<div class="section"><h2>Templates used (${templates.templates.length})</h2>`;
  if (!templates.templates.length) {
    html += `<p class="empty">No templates yet — this client hasn't had any AI renders recorded.</p>`;
  } else {
    html += `<div class="grid">`;
    templates.templates.forEach(t => {
      const pp = t.pose_profile || {};
      html += `<div class="card">
        <img src="${t.url}" onclick="openModal('${t.url}')" alt="template ${t.mockup_index}">
        <div class="meta">
          <span>template #${t.mockup_index}</span>
          <span class="badge muted">${t.render_count}× used</span>
        </div>
        <div class="note">toe=${pp.toe_side ?? '—'} · aspect=${pp.aspect ? pp.aspect.toFixed(2) : '—'} · fill=${pp.frame_fill ? (pp.frame_fill*100).toFixed(0) + '%' : '—'}</div>
      </div>`;
    });
    html += `</div>`;
  }
  html += `</div>`;

  // Baselines (human designer)
  html += `<div class="section"><h2>Human baseline designs (${baselines.baselines.length})</h2>`;
  if (!baselines.baselines.length) {
    html += `<p class="empty">No baseline outputs stored for this client.</p>`;
  } else {
    html += `<div class="grid">`;
    baselines.baselines.forEach(b => {
      html += `<div class="card">
        <img src="${b.url}" onclick="openModal('${b.url}')" alt="baseline">
        <div class="meta"><span>baseline v${b.version}</span><span class="badge muted">human</span></div>
      </div>`;
    });
    html += `</div>`;
  }
  html += `</div>`;

  body.innerHTML = html;
  attachFilterListeners(() => showClient(name, linkEl));
}

async function loadRuns() {
  document.getElementById('clients').innerHTML = '';
  const body = document.getElementById('body');
  body.innerHTML = '<p class="status">loading runs…</p>';
  const r = await fetch('/runs');
  const j = await r.json();
  if (!j.runs.length) {
    body.innerHTML = '<p class="empty">No runs yet. Generate something from <a href="/">the main page</a>.</p>';
    return;
  }
  let html = `<div class="section"><h2>All runs (${j.runs.length})</h2>`;
  html += `<div class="run-row header">
    <div>Label</div><div>Client</div><div>Kind</div><div>Renders</div><div>Avg score</div><div>Cost</div>
  </div>`;
  j.runs.forEach(run => {
    const avg = run.avg_score != null ? run.avg_score.toFixed(3) : '—';
    const avgCls = scoreClass(run.avg_score);
    html += `<div class="run-row" onclick="showRun(${run.id})">
      <div class="label">${run.label || '(unlabeled)'}<div style="font-size:.75rem;color:#888;">${run.created_at}</div></div>
      <div>${run.client_name || '—'}</div>
      <div><span class="badge kind-${run.kind}">${run.kind}</span></div>
      <div>${run.n_renders}${run.n_retries ? ` <span class="retry-icon" title="retries">🔁${run.n_retries}</span>` : ''}</div>
      <div><span class="badge ${avgCls}">${avg}</span></div>
      <div>$${(run.total_cost_usd || 0).toFixed(3)}</div>
    </div>`;
  });
  html += `</div>`;
  body.innerHTML = html;
}

async function showRun(runId) {
  const body = document.getElementById('body');
  body.innerHTML = '<p class="status">loading run…</p>';
  const j = await fetch(`/runs/${runId}`).then(r => r.json());
  const run = j.run;
  let html = `<div class="section"><a href="#" onclick="loadRuns();return false;">← all runs</a>
    <h2>${run.label || '(unlabeled)'} <span style="font-weight:400;font-size:.9rem;color:#888;">#${run.id}</span></h2>
    <p style="color:#888;">${run.created_at} → ${run.completed_at || 'running'} ·
      kind=<span class="badge kind-${run.kind}">${run.kind}</span> ·
      renders=${run.n_renders}${run.n_retries ? ` <span class="retry-icon">🔁${run.n_retries}</span>` : ''} ·
      avg=<span class="badge ${scoreClass(run.avg_score)}">${run.avg_score != null ? run.avg_score.toFixed(3) : '—'}</span> ·
      cost=$${(run.total_cost_usd || 0).toFixed(3)}</p>
  </div>`;
  // Group designs by mockup_index so variants sit next to each other
  const groups = {};
  j.designs.forEach(d => {
    const k = d.mockup_index ?? 'none';
    (groups[k] = groups[k] || []).push(d);
  });
  Object.entries(groups).forEach(([mk, list]) => {
    if (list.length > 1) {
      html += `<h3 style="margin-top:1.5rem;color:#888;font-weight:600;">mockup #${mk} — ${list.length} variants</h3>`;
    }
    html += `<div class="grid">`;
    list.forEach(d => {
      const cls = scoreClass(d.evaluator_score);
      const score = d.evaluator_score != null ? d.evaluator_score.toFixed(2) : '—';
      const src = d.image_url || '';
      const retryIcon = d.attempts > 1 ? ' <span class="retry-icon" title="retried">🔁</span>' : '';
      const heroIcon = d.is_hero ? ' <span class="hero-icon" title="hero variant">🏆</span>' : '';
      const dirPill = d.direction_label ? `<span class="direction-pill">${d.direction_label}</span>` : '';
      html += `<div class="card${d.is_hero ? ' hero' : ''}">
        ${src ? `<img src="${src}" onclick="openModal('${src}')" alt="mockup">` : '<div style="aspect-ratio:1;background:#dc354522;color:#dc3545;display:flex;align-items:center;justify-content:center;border-radius:4px;">no image</div>'}
        <div class="meta">
          <span>${dirPill}mock#${d.mockup_index ?? '?'} v${d.version}${retryIcon}${heroIcon}</span>
          <span class="badge ${cls}">${score}</span>
        </div>
        ${d.evaluator_notes ? `<div class="note">${d.evaluator_notes}</div>` : ''}
      </div>`;
    });
    html += `</div>`;
  });
  body.innerHTML = html;
}

document.getElementById('view-clients').onclick = () => {
  document.getElementById('view-clients').classList.add('active');
  document.getElementById('view-runs').classList.remove('active');
  loadClients();
};
document.getElementById('view-runs').onclick = () => {
  document.getElementById('view-runs').classList.add('active');
  document.getElementById('view-clients').classList.remove('active');
  loadRuns();
};

loadClients();
document.getElementById('modal').addEventListener('click', (e) => { if (e.target.id === 'modal') closeModal(); });
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });
</script>
</body>
</html>
